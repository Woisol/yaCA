name: Publish yaca-web package

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags: ['web-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_CACHE: .npm-cache

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace tests
        run: pnpm -w test

      - name: Build yaCA CLI package
        run: pnpm -w build

      - name: Build yaCA Web package
        run: pnpm --filter @woisol-g/yaca-web run build

      - name: Pack yaCA Web package
        run: pnpm --filter @woisol-g/yaca-web pack --pack-destination "$PWD"

      - name: Publish yaCA Web package
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/web-v')
        working-directory: apps/yaca-web
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write release summary
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./apps/yaca-web/package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./apps/yaca-web/package.json').version")"

          {
            echo "## Published package"
            echo
            echo "- npm: https://www.npmjs.com/package/${PACKAGE_NAME}"
            echo "- version: ${PACKAGE_VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"
